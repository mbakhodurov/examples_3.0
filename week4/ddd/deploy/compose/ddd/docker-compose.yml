services:
  postgres-ddd:
    image: ${POSTGRES_IMAGE}
    container_name: postgres-ddd
    env_file:
      - ../../../app.env
    volumes:
      - postgres_ddd_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_ddd_data:
