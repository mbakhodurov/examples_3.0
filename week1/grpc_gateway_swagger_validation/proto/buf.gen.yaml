version: v2
# Удаляет сгенеренное ранее, то что находится в out каждого плагина.
clean: true

# Генерируем Go-код только для наших proto-файлов.
# google/api и buf/validate используют стандартные Go-пакеты:
# - google.golang.org/genproto/googleapis/api/annotations
# - buf.build/gen/go/bufbuild/protovalidate/protocolbuffers/go/buf/validate

plugins:
  # Генерация Go-сообщений
  - local: ../bin/protoc-gen-go
    out: ../pkg/proto
    opt:
      - paths=source_relative
  # Генерация gRPC-кода (клиент и сервер)
  - local: ../bin/protoc-gen-go-grpc
    out: ../pkg/proto
    opt:
      - paths=source_relative
  # Генерация HTTP gateway
  - local: ../bin/protoc-gen-grpc-gateway
    out: ../pkg/proto
    opt:
      - paths=source_relative
  # Генерация OpenAPI/Swagger (встраивается в бинарник через go:embed)
  - local: ../bin/protoc-gen-openapiv2
    out: ../static/generated
    opt:
      - allow_merge=true
      - merge_file_name=ufo
      - json_names_for_fields=false

# Генерируем только для ufo, исключая внешние зависимости
inputs:
  - directory: .
    paths:
      - ufo
