# Единая схема ошибки для всех HTTP-кодов.
#
# Имя типа в Go генерируется ogen из имени файла (error.yaml -> Error),
# поэтому отдельное поле `name:` здесь не нужно (и более того, оно
# невалидно с точки зрения OpenAPI и подсвечивается линтерами).
#
# Преимущества единой схемы:
# - Уменьшает дублирование (все ошибки имеют одинаковую структуру)
# - Упрощает поддержку (изменения в одном месте)
# - Генерирует один базовый тип Error в Go-коде
#
# Конкретные example для каждого HTTP-кода живут не здесь, а в
# components/responses/*.yaml — это переопределяет example схемы на уровне
# media type и в Swagger UI отображается корректный пример под каждый код.
type: object
required:
  - code
  - message
properties:
  code:
    type: integer
    description: HTTP-код ошибки
  message:
    type: string
    description: Человекочитаемое описание ошибки
