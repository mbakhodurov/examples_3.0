# Конфигурационный файл для ogen (генератора Go-кода из OpenAPI спецификаций).
# Ogen автоматически ищет этот файл в текущей директории при запуске.
#
# Документация: https://ogen.dev/docs/config
#
# Основные секции конфигурации:
# - parser: настройки парсера OpenAPI спецификации
# - generator: настройки генерации кода (naming conventions, features, etc.)
# - filters: фильтрация операций для генерации

parser:
  # allow_remote разрешает парсеру загружать внешние файлы по URL.
  #
  # Это нужно когда в OpenAPI спецификации используются $ref ссылки
  # на удалённые ресурсы, например:
  #   $ref: 'https://example.com/schemas/common.yaml#/components/schemas/Error'
  #
  # По умолчанию: false (из соображений безопасности)
  # Если false - ogen откажется резолвить любые внешние URL в $ref
  allow_remote: true

generator:
  # convenient_errors управляет генерацией "удобных" ошибок (NewError / GenericErrorStatusCode).
  #
  # Когда в OpenAPI есть секция "default" response, ogen может сгенерировать специальный тип
  # GenericErrorStatusCode, позволяющий возвращать ошибки с произвольным HTTP-кодом.
  #
  # Возможные значения (начиная с ogen v1.x — строка, а не bool):
  #   "auto" — сгенерировать, если в спеке найден общий паттерн ошибок (значение по умолчанию)
  #   "on"   — форсировать генерацию; сборка упадёт, если общий паттерн не найден
  #   "off"  — полностью отключить фичу
  #
  # Мы не используем "default" response (указываем конкретные коды: 400, 404, 500),
  # поэтому ставим "off", чтобы убрать INFO-сообщение при генерации.
  convenient_errors: "off"
