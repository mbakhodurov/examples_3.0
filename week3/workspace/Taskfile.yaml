version: '3'

vars:
  GO_VERSION: '1.26.0'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  GCI_VERSION: 'v0.14.0'
  GOFUMPT_VERSION: 'v0.10.0'
  BUF_VERSION: '1.69.0'
  PROTOC_GEN_GO_VERSION: 'v1.36.11'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.6.1'
  OGEN_VERSION: 'v1.20.3'
  GOOSE_VERSION: 'v3.26.0'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'
  BUF: '{{.BIN_DIR}}/buf'
  PROTOC_GEN_GO: '{{.BIN_DIR}}/protoc-gen-go'
  PROTOC_GEN_GO_GRPC: '{{.BIN_DIR}}/protoc-gen-go-grpc'
  OGEN: '{{.BIN_DIR}}/ogen'
  GOOSE: '{{.BIN_DIR}}/goose'

  MODULES: grpc http

tasks:
  formatters:install:
    desc: "Устанавливает gofumpt и gci"
    cmds:
      - echo '📦 Устанавливаем gofumpt...'
      - GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
      - echo '📦 Устанавливаем gci...'
      - GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  golangci-lint:install:
    desc: "Устанавливает golangci-lint"
    cmds:
      - echo '📦 Устанавливаем golangci-lint...'
      - GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
    status:
      - test -x {{.GOLANGCI_LINT}}

  buf:install:
    desc: "Устанавливает buf"
    cmds:
      - echo '📦 Устанавливаем buf...'
      - GOBIN={{.BIN_DIR}} go install github.com/bufbuild/buf/cmd/buf@v{{.BUF_VERSION}}
    status:
      - test -x {{.BUF}}

  proto:install-plugins:
    desc: "Устанавливает protoc-плагины"
    cmds:
      - echo '📦 Устанавливаем protoc-gen-go...'
      - GOBIN={{.BIN_DIR}} go install google.golang.org/protobuf/cmd/protoc-gen-go@{{.PROTOC_GEN_GO_VERSION}}
      - echo '📦 Устанавливаем protoc-gen-go-grpc...'
      - GOBIN={{.BIN_DIR}} go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@{{.PROTOC_GEN_GO_GRPC_VERSION}}
    status:
      - test -x {{.PROTOC_GEN_GO}}
      - test -x {{.PROTOC_GEN_GO_GRPC}}

  ogen:install:
    desc: "Устанавливает ogen"
    cmds:
      - echo '📦 Устанавливаем ogen...'
      - GOBIN={{.BIN_DIR}} go install github.com/ogen-go/ogen/cmd/ogen@{{.OGEN_VERSION}}
    status:
      - test -x {{.OGEN}}

  goose:install:
    desc: "Устанавливает goose (миграции БД)"
    cmds:
      - echo '📦 Устанавливаем goose...'
      - GOBIN={{.BIN_DIR}} go install github.com/pressly/goose/v3/cmd/goose@{{.GOOSE_VERSION}}
    status:
      - test -x {{.GOOSE}}

  setup:
    desc: "Устанавливает все инструменты"
    deps: [formatters:install, golangci-lint:install, buf:install, proto:install-plugins, ogen:install, goose:install]

  format:
    desc: "Форматирует код (gofumpt + gci)"
    deps: [formatters:install]
    cmds:
      - echo '🧹 Форматируем код через gofumpt...'
      - find . -type f -name '*.go' ! -path '*/mocks/*' ! -path '*/pkg/proto/*' ! -path '*/pkg/openapi/*' -exec {{.GOFUMPT}} -extra -w {} +
      - echo '📦 Сортируем импорты через gci...'
      - find . -type f -name '*.go' ! -path '*/mocks/*' ! -path '*/pkg/proto/*' ! -path '*/pkg/openapi/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/olezhek28-courses/microservices-course-examples/)" {} +

  lint:
    desc: "Запускает golangci-lint"
    deps: [golangci-lint:install]
    cmds:
      - '{{.GOLANGCI_LINT}} run --allow-parallel-runners grpc/... http/... --config=.golangci.yml'

  proto:format:
    desc: "Форматирует .proto-файлы (buf format)"
    deps: [buf:install]
    dir: shared/proto
    cmds:
      - echo '🧹 Форматируем .proto-файлы...'
      - '{{.BUF}} format -w'

  proto:lint:
    desc: "Проверяет .proto-файлы линтером"
    deps: [buf:install, proto:install-plugins, proto:format]
    dir: shared/proto
    cmds:
      - echo '🔍 Проверяем .proto-файлы...'
      - '{{.BUF}} lint'

  proto:gen:
    desc: "Генерирует Go-код из .proto"
    deps: [buf:install, proto:install-plugins, proto:format]
    dir: shared/proto
    cmds:
      - echo '🔨 Генерируем Go-код из .proto...'
      - '{{.BUF}} generate'

  ogen:gen:
    desc: "Генерирует Go-код из OpenAPI"
    deps: [ogen:install]
    dir: shared
    cmds:
      - echo '🔨 Генерируем Go-код из OpenAPI...'
      - '{{.OGEN}} -target ./pkg/openapi/weather/v1 -package weatherv1 -clean ./api/weather/v1/weather.openapi.yaml 2>/dev/null'

  gen:
    desc: "Генерирует весь код"
    cmds:
      - task: proto:gen
      - task: ogen:gen

  deps:update:
    desc: "Обновляет зависимости"
    cmds:
      - echo '🔄 Синхронизируем go.work...'
      - go work sync
      - echo '🔄 Обновляем зависимости в модулях...'
      - for: { var: MODULES }
        cmd: cd {{.ITEM}} && go mod tidy -compat={{.GO_VERSION}}

  run:grpc:
    desc: "Запускает gRPC-сервер"
    cmds:
      - go run grpc/cmd/server/main.go

  run:http:
    desc: "Запускает HTTP-сервер"
    cmds:
      - go run http/cmd/server/main.go

  up-core:
    desc: "Создать общую сеть для микросервисов"
    cmds:
      - echo '[task] 🌐 Создаём общую сеть microservices-net'
      - docker network rm microservices-net 2>/dev/null || true
      - docker network create microservices-net 2>/dev/null || true

  down-core:
    desc: "Удалить общую сеть микросервисов"
    cmds:
      - echo '[task] 🛑 Удаляем общую сеть microservices-net'
      - docker network rm microservices-net 2>/dev/null || true

  up-grpc:
    desc: "Поднять gRPC сервис и все его зависимости"
    dir: deploy/compose/grpc # --env-file путь относительно этой директории
    cmds:
      - echo '[task] 📦 Поднимаем gRPC сервис с зависимостями'
      - docker compose --env-file ../../../grpc.env up --build --detach

  down-grpc:
    desc: "Остановить и удалить gRPC сервис и все его зависимости"
    dir: deploy/compose/grpc # --env-file путь относительно этой директории
    cmds:
      - echo '[task] 🛑 Останавливаем gRPC сервис с зависимостями'
      - docker compose --env-file ../../../grpc.env down --volumes

  up-http:
    desc: "Поднять HTTP сервис и все его зависимости"
    dir: deploy/compose/http # --env-file путь относительно этой директории
    cmds:
      - echo '[task] 📦 Поднимаем HTTP сервис с зависимостями'
      - docker compose --env-file ../../../http.env up --build --detach

  down-http:
    desc: "Остановить и удалить HTTP сервис и все его зависимости"
    dir: deploy/compose/http # --env-file путь относительно этой директории
    cmds:
      - echo '[task] 🛑 Останавливаем HTTP сервис с зависимостями'
      - docker compose --env-file ../../../http.env down --volumes

  up-all:
    desc: "Поднять все сервисы по очереди вместе с зависимостями"
    cmds:
      - task up-core
      - task up-grpc
      - task up-http

  down-all:
    desc: "Остановить и удалить все сервисы по очереди вместе с зависимостями"
    cmds:
      - task down-core
      - task down-grpc
      - task down-http

  migrate:grpc:up:
    desc: "Применяет все миграции gRPC-сервиса"
    deps: [goose:install]
    dotenv: ['grpc.env']
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" up'

  migrate:grpc:down:
    desc: "Откатывает последнюю миграцию gRPC-сервиса"
    deps: [goose:install]
    dotenv: ['grpc.env']
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" down'

  migrate:grpc:status:
    desc: "Показывает статус миграций gRPC-сервиса"
    deps: [goose:install]
    dotenv: ['grpc.env']
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" status'

  migrate:http:up:
    desc: "Применяет все миграции HTTP-сервиса"
    deps: [goose:install]
    dotenv: ['http.env']
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" up'

  migrate:http:down:
    desc: "Откатывает последнюю миграцию HTTP-сервиса"
    deps: [goose:install]
    dotenv: ['http.env']
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" down'

  migrate:http:status:
    desc: "Показывает статус миграций HTTP-сервиса"
    deps: [goose:install]
    dotenv: ['http.env']
    cmds:
      - '{{.GOOSE}} -dir $MIGRATIONS_DIR postgres "$DB_URI" status'

  test:api:
    desc: "Запускает API-тесты"
    cmds:
      - go test -v -count=1 ./grpc/tests/... ./http/tests/...
