version: '3'

vars:
  GO_VERSION: '1.26.0'
  GOLANGCI_LINT_VERSION: 'v2.12.2'
  GCI_VERSION: 'v0.14.0'
  GOFUMPT_VERSION: 'v0.10.0'
  GOOSE_VERSION: 'v3.26.0'

  BIN_DIR: '{{.ROOT_DIR}}/bin'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint'
  GCI: '{{.BIN_DIR}}/gci'
  GOFUMPT: '{{.BIN_DIR}}/gofumpt'
  GOOSE: '{{.BIN_DIR}}/goose'

tasks:
  formatters:install:
    desc: "Устанавливает gofumpt и gci"
    cmds:
      - echo '📦 Устанавливаем gofumpt...'
      - GOBIN={{.BIN_DIR}} go install mvdan.cc/gofumpt@{{.GOFUMPT_VERSION}}
      - echo '📦 Устанавливаем gci...'
      - GOBIN={{.BIN_DIR}} go install github.com/daixiang0/gci@{{.GCI_VERSION}}
    status:
      - test -x {{.GOFUMPT}}
      - test -x {{.GCI}}

  golangci-lint:install:
    desc: "Устанавливает golangci-lint"
    cmds:
      - echo '📦 Устанавливаем golangci-lint...'
      - GOBIN={{.BIN_DIR}} go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
    status:
      - test -x {{.GOLANGCI_LINT}}

  goose:install:
    desc: "Устанавливает goose (миграции БД)"
    cmds:
      - echo '📦 Устанавливаем goose...'
      - GOBIN={{.BIN_DIR}} go install github.com/pressly/goose/v3/cmd/goose@{{.GOOSE_VERSION}}
    status:
      - test -x {{.GOOSE}}

  setup:
    desc: "Устанавливает все инструменты"
    deps: [formatters:install, golangci-lint:install, goose:install]

  format:
    desc: "Форматирует код (gofumpt + gci)"
    deps: [formatters:install]
    cmds:
      - echo '🧹 Форматируем код через gofumpt...'
      - find . -type f -name '*.go' ! -path '*/mocks/*' ! -path '*/pkg/proto/*' -exec {{.GOFUMPT}} -extra -w {} +
      - echo '📦 Сортируем импорты через gci...'
      - find . -type f -name '*.go' ! -path '*/mocks/*' ! -path '*/pkg/proto/*' -exec {{.GCI}} write -s standard -s default -s "prefix(github.com/olezhek28-courses/microservices-course-examples/)" {} +

  lint:
    desc: "Запускает golangci-lint"
    deps: [golangci-lint:install]
    cmds:
      - '{{.GOLANGCI_LINT}} run --allow-parallel-runners ./... --config=.golangci.yml'

  docker:compose:up:
    desc: "Запускает все контейнеры через Docker Compose"
    cmds:
      - echo '🚀 Поднимаем контейнеры через Docker Compose...'
      - docker compose up --build --detach

  docker:compose:down:
    desc: "Останавливает все контейнеры"
    cmds:
      - echo '🛑 Останавливаем контейнеры...'
      - docker compose down --volumes

  migrate:up:
    desc: "Применяет все миграции"
    deps: [goose:install]
    dotenv: ['.env']
    cmds:
      - '{{.GOOSE}} -dir migrations postgres "$DB_URI" up'

  migrate:down:
    desc: "Откатывает последнюю миграцию"
    deps: [goose:install]
    dotenv: ['.env']
    cmds:
      - '{{.GOOSE}} -dir migrations postgres "$DB_URI" down'

  migrate:status:
    desc: "Показывает статус миграций"
    deps: [goose:install]
    dotenv: ['.env']
    cmds:
      - '{{.GOOSE}} -dir migrations postgres "$DB_URI" status'

  run:
    desc: "Запускает демо-программу"
    cmds:
      - go run ./cmd/...

  test:api:
    desc: "Запускает интеграционные тесты API"
    cmds:
      - go test -v -count=1 ./tests/...
